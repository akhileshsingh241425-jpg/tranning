<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0066cc" />

    <!-- Primary SEO -->
    <title>TrainingProtec | IT Certification Training – Data Science, Cloud, Cyber Security & More</title>
    <meta name="description" content="TrainingProtec offers industry-recognized IT & management certification training in Data Science, Cloud Computing, Cyber Security, Full Stack Development, Digital Marketing & more. Live classes, expert trainers, job assistance." />
    <meta name="keywords" content="IT certification training, data science course, cloud computing training, cyber security course, full stack development, digital marketing course, business analytics, UI UX design, mobile app development, online training India, TrainingProtec" />
    <meta name="author" content="TrainingProtec" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://www.trainingprotec.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.trainingprotec.com/" />
    <meta property="og:site_name" content="TrainingProtec" />
    <meta property="og:title" content="TrainingProtec | IT Certification Training – Data Science, Cloud, Cyber Security & More" />
    <meta property="og:description" content="Industry-recognized IT & management certification training with live instructor-led classes, real-world projects, and job assistance. Enroll today!" />
    <meta property="og:image" content="https://www.trainingprotec.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@trainingprotec" />
    <meta name="twitter:title" content="TrainingProtec | IT Certification Training" />
    <meta name="twitter:description" content="Data Science, Cloud, Cyber Security, Full Stack & more. Live classes by industry experts. Job assistance included." />
    <meta name="twitter:image" content="https://www.trainingprotec.com/og-image.png" />

    <!-- Geo Targeting -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="language" content="English" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "TrainingProtec",
      "url": "https://www.trainingprotec.com",
      "logo": "https://www.trainingprotec.com/favicon.png",
      "description": "TrainingProtec offers professional IT and management certification training in Data Science, Cloud Computing, Cyber Security, Full Stack Development, Digital Marketing and more.",
      "email": "contact@trainingprotec.com",
      "sameAs": [
        "https://www.facebook.com/trainingprotec",
        "https://www.linkedin.com/company/trainingprotec",
        "https://www.instagram.com/trainingprotec",
        "https://www.youtube.com/@trainingprotec"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "IT Certification Courses",
        "itemListElement": [
          {"@type": "Offer", "itemOffered": {"@type": "Course", "name": "Data Science & AI"}},
          {"@type": "Offer", "itemOffered": {"@type": "Course", "name": "Cloud Computing & DevOps"}},
          {"@type": "Offer", "itemOffered": {"@type": "Course", "name": "Cyber Security"}},
          {"@type": "Offer", "itemOffered": {"@type": "Course", "name": "Full Stack Web Development"}},
          {"@type": "Offer", "itemOffered": {"@type": "Course", "name": "Digital Marketing"}},
          {"@type": "Offer", "itemOffered": {"@type": "Course", "name": "Business Analytics"}},
          {"@type": "Offer", "itemOffered": {"@type": "Course", "name": "UI/UX Design"}},
          {"@type": "Offer", "itemOffered": {"@type": "Course", "name": "Mobile App Development"}}
        ]
      }
    }
    </script>

    <!-- Structured Data: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TrainingProtec",
      "url": "https://www.trainingprotec.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.trainingprotec.com/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Performance: Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.trainingprotec.com" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
